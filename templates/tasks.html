<!DOCTYPE html>
<html>
<head>

<title>Tasks</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-dark bg-dark">

<div class="container-fluid">

<span class="navbar-brand">
Task Manager
</span>

<div>

<a href="/"
class="btn btn-outline-light btn-sm">
Dashboard
</a>

<a href="/logout"
class="btn btn-outline-light btn-sm">
Logout
</a>

</div>

</div>

</nav>

<div class="container mt-4">

<h4>Create Task</h4>

<form method="POST"
action="/create_task"
class="row g-3">

<div class="col-md-6">

<input type="text"
name="title"
class="form-control"
placeholder="Task Title"
required>

</div>

<div class="col-md-6">

<select name="priority"
class="form-select">

<option value="Low">Low</option>
<option value="Medium">Medium</option>
<option value="High">High</option>

</select>

</div>

<div class="col-md-12">

<textarea name="description"
class="form-control"
placeholder="Description">
</textarea>

</div>

<div class="col-md-4">

<input type="date"
name="due_date"
class="form-control">

</div>

<div class="col-md-4">

<select name="assigned_to"
class="form-select">

{% for user in users %}

<option value="{{ user.id }}">
{{ user.username }}
</option>

{% endfor %}

</select>

</div>

<div class="col-md-4">

<button type="submit"
class="btn btn-primary w-100">

Create Task

</button>

</div>

</form>

<hr>

<h4>All Tasks</h4>

<table class="table table-bordered">

<thead class="table-dark">

<tr>

<th>Title</th>
<th>Status</th>
<th>Priority</th>
<th>Due</th>
<th>Assigned</th>
<th>Actions</th>

</tr>

</thead>

<tbody>

{% for task in tasks %}

<tr>

<td>{{ task.title }}</td>

<td>

<form method="POST"
action="/update_status/{{ task.id }}">

<select name="status"
class="form-select form-select-sm">

<option value="Pending">Pending</option>

<option value="In Progress">
In Progress
</option>

<option value="Completed">
Completed
</option>

<option value="Blocked">
Blocked
</option>

</select>

<button class="btn btn-sm btn-success mt-1">
Update
</button>

</form>

</td>

<td>{{ task.priority }}</td>

<td>{{ task.due_date }}</td>

<td>{{ task.assigned_to }}</td>

<td>

<a href="/edit_task/{{ task.id }}"
class="btn btn-warning btn-sm">
Edit
</a>

<a href="/delete_task/{{ task.id }}"
class="btn btn-danger btn-sm">
Delete
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
