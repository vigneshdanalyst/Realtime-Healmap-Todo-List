<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <a class="brand" href="{{ url_for('home') if current_user.is_authenticated else url_for('login') }}">
                <span class="brand-mark">TB</span>
                <span class="brand-name">{{ app_name }}</span>
            </a>

            {% if current_user.is_authenticated %}
            <nav class="nav-list" aria-label="Main navigation">
                <a class="nav-link {% if request.endpoint == 'home' %}active{% endif %}" href="{{ url_for('home') }}">
                    <span>Dashboard</span>
                </a>
                <a class="nav-link {% if request.endpoint in ['tasks', 'edit_task'] %}active{% endif %}" href="{{ url_for('tasks') }}">
                    <span>Tasks</span>
                </a>
            </nav>

            <div class="user-panel">
                <div class="avatar">{{ current_user.username[:1].upper() }}</div>
                <div>
                    <p>{{ current_user.username }}</p>
                    <a href="{{ url_for('logout') }}">Sign out</a>
                </div>
            </div>
            {% endif %}
        </aside>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
