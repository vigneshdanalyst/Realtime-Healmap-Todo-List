{% extends "layout.html" %}

{% block title %}Edit Task - {{ app_name }}{% endblock %}

{% block content %}
<section class="page-header">
    <div>
        <p class="eyebrow">Edit</p>
        <h1>Task details</h1>
        <p class="muted">Update the task without losing your place.</p>
    </div>
    <a class="button ghost" href="{{ url_for('tasks') }}">Back to Tasks</a>
</section>

<section class="panel narrow">
    <form method="POST" class="task-form single">
        <label class="wide">
            <span>Title</span>
            <input type="text" name="title" value="{{ task.title }}" required>
        </label>
        <label class="wide">
            <span>Description</span>
            <textarea name="description" rows="4">{{ task.description or "" }}</textarea>
        </label>
        <label>
            <span>Priority</span>
            <select name="priority">
                <option value="Low" {% if task.priority == 'Low' %}selected{% endif %}>Low</option>
                <option value="Medium" {% if task.priority == 'Medium' %}selected{% endif %}>Medium</option>
                <option value="High" {% if task.priority == 'High' %}selected{% endif %}>High</option>
            </select>
        </label>
        <label>
            <span>Due date</span>
            <input type="date" name="due_date" value="{{ task.due_date or '' }}">
        </label>
        <label class="wide">
            <span>Assigned to</span>
            <select name="assigned_to">
                {% for user in users %}
                <option value="{{ user.id }}" {% if task.assigned_to == user.id %}selected{% endif %}>{{ user.username }}</option>
                {% endfor %}
            </select>
        </label>
        <div class="form-actions wide">
            <a class="button ghost" href="{{ url_for('tasks') }}">Cancel</a>
            <button class="button primary" type="submit">Save Changes</button>
        </div>
    </form>
</section>
{% endblock %}
